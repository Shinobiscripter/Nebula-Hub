<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NebulaHub Notice</title>

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    p {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      background: #0096ff;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    a:hover {
      background: #0077cc;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>NebulaHub Shutdown</h1>
    <p>
      This version of NebulaHub is no longer maintained and is shut down.<br><br>
      The new version is available below.
    </p>
    <a href="https://nebula-hub-2.vercel.app/" target="_blank">
      Go to New NebulaHub →
    </a>
  </div>

</body>
</html>
